<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mira Dashboard - MindReady CWG 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6f8;color:#202124}
#login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#0D3B6E,#1a5294)}
.logo{width:64px;height:64px;border-radius:50%;background:#FFD700;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#0D3B6E;margin-bottom:14px}
h1{color:#fff;font-size:22px;margin-bottom:6px}
.sub{color:rgba(255,255,255,0.6);font-size:13px;margin-bottom:28px;text-align:center}
input[type=password]{width:100%;max-width:300px;padding:14px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:#fff;font-size:16px;outline:none;margin-bottom:10px;display:block}
input[type=password]::placeholder{color:rgba(255,255,255,0.4)}
input[type=password]:focus{border-color:#FFD700}
.login-btn{width:100%;max-width:300px;padding:14px;border-radius:10px;border:none;background:#FFD700;color:#0D3B6E;font-size:15px;font-weight:700;cursor:pointer;display:block}
.err{color:#ffb3b3;font-size:13px;margin-top:8px;min-height:18px;text-align:center}
#dash{display:none;padding:20px;max-width:1100px;margin:0 auto}
.dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.dash-title{font-size:20px;font-weight:700;color:#0D3B6E}
.conn{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:600}
.live{background:#eafaf1;color:#1a7a4a}
.offline{background:#fdf2f2;color:#C0392B}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.stat{background:#fff;border:1px solid #e8eaed;border-radius:14px;padding:14px;box-shadow:0 2px 8px rgba(13,59,110,.08)}
.stat .n{font-size:26px;font-weight:700;color:#0D3B6E}
.stat .l{font-size:11px;color:#9aa0a8;font-weight:600;text-transform:uppercase;margin-top:2px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card{background:#fff;border:1px solid #e8eaed;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(13,59,110,.08);cursor:pointer;transition:transform .1s}
.card:hover{transform:translateY(-2px)}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.card-name{font-size:14px;font-weight:600}
.card-time{font-size:11px;color:#9aa0a8}
.flag{margin-left:auto;font-size:16px}
.row{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-top:1px solid #f5f6f8}
.row span:first-child{color:#5f6368}
.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.b-low{background:#eafaf1;color:#1a7a4a}
.b-mod{background:#fef9e7;color:#d68910}
.b-high{background:#fdf2f2;color:#C0392B}
.b-none{background:#f5f6f8;color:#9aa0a8}
.empty{text-align:center;padding:60px 20px;color:#9aa0a8;grid-column:1/-1}
.empty-icon{font-size:40px;margin-bottom:12px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;align-items:center;justify-content:center;padding:16px}
#modal{background:#fff;border-radius:14px;max-width:540px;width:100%;max-height:85vh;overflow-y:auto;padding:20px}
.modal-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.close-btn{margin-left:auto;background:none;border:none;font-size:22px;color:#9aa0a8;cursor:pointer}
.section{font-size:11px;font-weight:700;color:#9aa0a8;text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px}
.item{border-left:3px solid #0D3B6E;padding:8px 12px;margin-bottom:6px;background:#f5f6f8;border-radius:0 8px 8px 0;font-size:12px;line-height:1.5}
.item.r{border-color:#1a7a4a;background:#eafaf1}
.item.c{border-color:#7b3fe4;background:#f5f0ff}
</style>
</head>
<body>

<div id="login">
  <div class="logo">MY</div>
  <h1>Mira's Dashboard</h1>
  <p class="sub">MindReady · Malaysia CWG 2026</p>
  <input type="password" id="pin" placeholder="Enter admin PIN" onkeydown="if(event.key==='Enter')login()">
  <button class="login-btn" onclick="login()">Enter Dashboard</button>
  <div class="err" id="err"></div>
</div>

<div id="dash">
  <div class="dash-header">
    <div>
      <div class="dash-title">MindReady Dashboard</div>
      <div style="font-size:12px;color:#9aa0a8">Live athlete data · Malaysia CWG 2026</div>
    </div>
    <div class="conn offline" id="conn">Connecting...</div>
  </div>
  <div class="stats">
    <div class="stat"><div class="n" id="s-athletes">0</div><div class="l">Athletes</div></div>
    <div class="stat"><div class="n" id="s-checkins">0</div><div class="l">Check-ins</div></div>
    <div class="stat"><div class="n" id="s-flags">0</div><div class="l">Flagged</div></div>
    <div class="stat"><div class="n" id="s-cog">0</div><div class="l">Cog Tests</div></div>
  </div>
  <div class="grid" id="grid">
    <div class="empty"><div class="empty-icon">📭</div>Waiting for athlete data...</div>
  </div>
</div>

<div id="overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>

var ADMIN_PIN = 'MIRA2026';

var fbConfig = {
  apiKey: "AIzaSyAp2QDoXOo-kmo3m82UgVDEQLWNuwrUjn4",
  authDomain: "mindready-cwg.firebaseapp.com",
  databaseURL: "https://mindready-cwg-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mindready-cwg",
  storageBucket: "mindready-cwg.firebasestorage.app",
  messagingSenderId: "712667572058",
  appId: "1:712667572058:web:510595459a5d621daf3563"
};

var db = null;
var allData = {};

function login() {
  var entered = document.getElementById('pin').value.trim();
  var errEl = document.getElementById('err');
  errEl.textContent = '';

  if (entered === '') {
    errEl.textContent = 'Please enter the PIN.';
    return;
  }

  if (entered !== ADMIN_PIN) {
    errEl.textContent = 'Wrong PIN. It is case-sensitive.';
    return;
  }

  document.getElementById('login').style.display = 'none';
  document.getElementById('dash').style.display = 'block';
  startFirebase();
}

function startFirebase() {
  try {
    firebase.initializeApp(fbConfig);
    db = firebase.database();

    db.ref('.info/connected').on('value', function(snap) {
      var el = document.getElementById('conn');
      if (snap.val() === true) {
        el.textContent = 'Live';
        el.className = 'conn live';
      } else {
        el.textContent = 'Offline';
        el.className = 'conn offline';
      }
    });

    db.ref('athletes').on('value', function(snap) {
      allData = snap.val() || {};
      renderGrid();
    });

  } catch(e) {
    document.getElementById('conn').textContent = 'Firebase error: ' + e.message;
  }
}

function toArr(obj) {
  if (!obj) return [];
  return Object.values(obj).sort(function(a,b){ return (a._ts||0)-(b._ts||0); });
}

function last(arr) {
  return arr.length ? arr[arr.length-1] : null;
}

function avatarColor(name) {
  var cols = ['#0D3B6E','#1a5294','#185FA5','#1a7a4a','#6a3e9e','#a05c00','#8b2020','#1a6b6b'];
  var h = 0;
  for (var i=0; i<name.length; i++) h = name.charCodeAt(i) + ((h<<5)-h);
  return cols[Math.abs(h) % cols.length];
}

function initials(name) {
  var parts = (name||'?').trim().split(' ');
  if (parts.length >= 2) return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
  return name.substring(0,2).toUpperCase();
}

function getSummary(key, data) {
  var d = data.data || {};
  var checkins    = toArr(d.checkins);
  var reflections = toArr(d.reflections);
  var stroop      = toArr(d.cog_stroop);
  var digit       = toArr(d.cog_digit);
  var ps          = toArr(d.cog_ps);
  var gng         = toArr(d.cog_gng);
  var rot         = toArr(d.cog_rot);

  var lastCI = last(checkins);
  var allTs  = checkins.concat(reflections,stroop,digit,ps,gng,rot).map(function(x){return x._ts||0});
  var lastActive = data.lastActive || (allTs.length ? Math.max.apply(null,allTs) : 0);

  var anxLvl = 'none';
  if (lastCI) anxLvl = lastCI.avg<=3?'low':lastCI.avg<=6?'mod':'high';

  var cogArr = [stroop,digit,ps,gng,rot].map(last).filter(Boolean).map(function(x){return x.score});
  var flagged = anxLvl==='high' || cogArr.some(function(s){return s<40});
  var totalCog = stroop.length+digit.length+ps.length+gng.length+rot.length;

  return {
    key: key,
    name: data.name || (lastCI&&lastCI._name) || key,
    checkins: checkins, reflections: reflections,
    stroop: stroop, digit: digit, ps: ps, gng: gng, rot: rot,
    lastCI: lastCI, lastActive: lastActive,
    anxLvl: anxLvl, flagged: flagged,
    totalCog: totalCog, totalCI: checkins.length
  };
}

function badgeClass(lvl) {
  return lvl==='low'?'b-low':lvl==='mod'?'b-mod':lvl==='high'?'b-high':'b-none';
}

function timeStr(ts) {
  if (!ts) return 'Never';
  return new Date(ts).toLocaleString('en-MY',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

function renderGrid() {
  var keys = Object.keys(allData);
  var grid = document.getElementById('grid');

  if (!keys.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>No athlete data yet. Athletes will appear here once they log in and submit a check-in.</div>';
    updateStats([]);
    return;
  }

  var summaries = keys.map(function(k){ return getSummary(k, allData[k]); });
  summaries.sort(function(a,b){ return b.lastActive-a.lastActive; });
  updateStats(summaries);

  grid.innerHTML = summaries.map(function(s) {
    var anx = s.lastCI ? s.lastCI.avg+'/10' : '--';
    return '<div class="card" onclick="openDetail(\''+s.key+'\')">'+
      '<div class="card-top">'+
        '<div class="av" style="background:'+avatarColor(s.name)+'">'+initials(s.name)+'</div>'+
        '<div><div class="card-name">'+s.name+'</div><div class="card-time">Last active: '+timeStr(s.lastActive)+'</div></div>'+
        (s.flagged?'<div class="flag" title="Needs attention">&#x1F6A9;</div>':'')+
      '</div>'+
      '<div class="row"><span>Latest anxiety</span><span class="badge '+badgeClass(s.anxLvl)+'">'+anx+'</span></div>'+
      '<div class="row"><span>Check-ins</span><span>'+s.totalCI+'</span></div>'+
      '<div class="row"><span>Reflections</span><span>'+s.reflections.length+'</span></div>'+
      '<div class="row"><span>Cognitive tests</span><span>'+s.totalCog+'</span></div>'+
    '</div>';
  }).join('');
}

function updateStats(sums) {
  document.getElementById('s-athletes').textContent = sums.length;
  document.getElementById('s-checkins').textContent = sums.reduce(function(a,s){return a+s.totalCI},0);
  document.getElementById('s-flags').textContent    = sums.filter(function(s){return s.flagged}).length;
  document.getElementById('s-cog').textContent      = sums.reduce(function(a,s){return a+s.totalCog},0);
}

function openDetail(key) {
  var s = getSummary(key, allData[key]);
  var html = '<div class="modal-header">'+
    '<div class="av" style="background:'+avatarColor(s.name)+';width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;">'+initials(s.name)+'</div>'+
    '<div><div style="font-size:16px;font-weight:700">'+s.name+'</div>'+
    '<div style="font-size:12px;color:#9aa0a8">'+(s.flagged?'Flagged for attention':'No flags')+'</div></div>'+
    '<button class="close-btn" onclick="closeModal()">x</button>'+
  '</div>';

  html += '<div class="section">Recent check-ins</div>';
  if (!s.checkins.length) {
    html += '<div class="item">No check-ins yet</div>';
  } else {
    s.checkins.slice().reverse().slice(0,8).forEach(function(c) {
      html += '<div class="item">'+timeStr(c._ts)+' &mdash; Cognitive: '+c.cog+'/10 &bull; Somatic: '+c.som+'/10 &bull; Confidence: '+c.conf+'/10 &bull; Avg: <strong>'+c.avg+'/10</strong>'+(c.mood?' &bull; '+c.mood:'')+'</div>';
    });
  }

  html += '<div class="section">Reflections</div>';
  if (!s.reflections.length) {
    html += '<div class="item r">No reflections yet</div>';
  } else {
    s.reflections.slice().reverse().slice(0,5).forEach(function(r) {
      html += '<div class="item r">'+timeStr(r._ts)+' &mdash; '+r.txt+' (Satisfaction: '+r.sat+'/10)</div>';
    });
  }

  html += '<div class="section">Cognitive Battery</div>';
  var tests = [
    ['Stroop (Attention)', s.stroop],
    ['Digit Span (Memory)', s.digit],
    ['Tap the Target (Speed)', s.ps],
    ['Go/No-Go (Impulse Control)', s.gng],
    ['Mental Rotation (Spatial)', s.rot]
  ];
  tests.forEach(function(t) {
    var lbl = t[0], arr = t[1], lg = last(arr);
    if (!lg) {
      html += '<div class="item c">'+lbl+': not taken yet</div>';
    } else {
      html += '<div class="item c">'+lbl+': <strong>'+lg.score+'/100</strong> &mdash; '+timeStr(lg._ts)+'</div>';
    }
  });

  document.getElementById('modal').innerHTML = html;
  document.getElementById('overlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('overlay').style.display = 'none';
}

</script>
</body>
</html>
